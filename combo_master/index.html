<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Combo Builder — Distributive Property</title>

  <style>
    /* ============================================================
       DESIGN SYSTEM — CSS CUSTOM PROPERTIES
    ============================================================ */
    :root {
      /* Colors */
      --bg:              #0d1526;
      --bg-grid:         rgba(255,255,255,0.02);
      --surface:         #152040;
      --surface-raised:  #1c2d52;
      --surface-card:    #192849;
      --accent:          #f5a623;
      --accent-dim:      rgba(245,166,35,0.15);
      --accent-border:   rgba(245,166,35,0.4);
      --text-1:          #e8eeff;
      --text-2:          #7a95c0;
      --text-3:          #4a618a;
      --success:         #26c987;
      --success-bg:      rgba(38,201,135,0.1);
      --success-border:  rgba(38,201,135,0.5);
      --error:           #e5626a;
      --error-bg:        rgba(229,98,106,0.1);
      --error-border:    rgba(229,98,106,0.5);
      --hint:            #6ab0e0;
      --hint-bg:         rgba(106,176,224,0.1);
      --hint-border:     rgba(106,176,224,0.5);
      --border:          rgba(255,255,255,0.07);
      --border-hover:    rgba(255,255,255,0.14);

      /* Spacing */
      --space-xs:  4px;
      --space-sm:  8px;
      --space-md:  16px;
      --space-lg:  24px;
      --space-xl:  36px;
      --space-2xl: 52px;

      /* Radius */
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 18px;
      --r-xl: 28px;

      /* Shadows */
      --shadow-sm: 0 2px 12px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.45);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);

      /* Typography */
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-mono: 'Consolas', 'Courier New', monospace;

      /* Transitions */
      --t: 0.18s ease;
      --t-slow: 0.35s ease;
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-family: var(--font);
      font-size: 16px;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      /* Subtle grid texture */
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-md) var(--space-md) 48px;
    }

    /* ============================================================
       APP CONTAINER
    ============================================================ */
    #app {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      animation: fadeSlideUp 0.4s ease both;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       PROGRESS BAR
    ============================================================ */
    .progress-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 14px 20px;
      box-shadow: var(--shadow-sm);
    }

    .progress-track {
      display: flex;
      gap: 6px;
    }

    .progress-seg {
      flex: 1;
      height: 5px;
      border-radius: 3px;
      background: var(--border-hover);
      transition: background 0.5s ease;
    }

    .progress-seg.complete { background: var(--success); }
    .progress-seg.active   { background: var(--accent); }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }

    .progress-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-3);
      transition: color 0.3s;
    }

    .progress-label.active   { color: var(--accent); }
    .progress-label.complete { color: var(--success); }

    /* ============================================================
       CARD
    ============================================================ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: var(--space-lg) var(--space-xl);
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      animation: fadeSlideUp 0.3s ease both;
    }

    @media (max-width: 560px) {
      .card { padding: var(--space-md); }
    }

    .card-inner {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--space-md) var(--space-lg);
    }

    /* ============================================================
       TYPOGRAPHY
    ============================================================ */
    .game-title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -1px;
      line-height: 1.05;
    }

    .phase-eyebrow {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .section-title {
      font-size: clamp(1.25rem, 3vw, 1.7rem);
      font-weight: 800;
      color: var(--text-1);
      line-height: 1.2;
    }

    .question-text {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-1);
      line-height: 1.6;
    }

    .body-text {
      font-size: 0.93rem;
      color: var(--text-2);
      line-height: 1.65;
    }

    .caption {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-3);
    }

    /* ============================================================
       DIVIDER
    ============================================================ */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    /* ============================================================
       BUTTONS
    ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      padding: 13px 26px;
      border-radius: var(--r-md);
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.97rem;
      font-weight: 700;
      transition: all var(--t);
      min-height: 50px;
      min-width: 50px;
      text-decoration: none;
      position: relative;
    }

    .btn:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    .btn:disabled {
      cursor: not-allowed;
    }

    /* Primary */
    .btn-primary {
      background: var(--accent);
      color: #1a0d00;
      box-shadow: 0 3px 16px rgba(245,166,35,0.25);
    }

    .btn-primary:hover:not(:disabled) {
      background: #ffb83a;
      box-shadow: 0 4px 24px rgba(245,166,35,0.4);
      transform: translateY(-1px);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    /* Ghost */
    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border-hover);
    }

    .btn-ghost:hover:not(:disabled) {
      background: var(--surface-raised);
      color: var(--text-1);
      border-color: var(--border-hover);
    }

    /* Hint */
    .btn-hint {
      background: transparent;
      color: var(--hint);
      border: 1px solid var(--hint-border);
      padding: 9px 18px;
      font-size: 0.85rem;
      min-height: 40px;
    }

    .btn-hint:hover:not(:disabled) {
      background: var(--hint-bg);
    }

    /* Choice buttons */
    .choices-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 480px) {
      .choices-grid { grid-template-columns: 1fr; }
    }

    .btn-choice {
      background: var(--surface-raised);
      color: var(--text-1);
      border: 2px solid var(--border-hover);
      border-radius: var(--r-md);
      padding: 14px 18px;
      text-align: left;
      font-size: 0.97rem;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      min-height: 54px;
      transition: all var(--t);
      width: 100%;
    }

    .btn-choice:hover:not(:disabled) {
      border-color: var(--accent-border);
      background: var(--accent-dim);
      transform: translateX(4px);
    }

    .btn-choice:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    .btn-choice.is-correct {
      border-color: var(--success-border);
      background: var(--success-bg);
      color: var(--success);
      font-weight: 700;
    }

    .btn-choice.is-wrong {
      border-color: var(--error-border);
      background: var(--error-bg);
      color: var(--error);
    }

    .btn-choice:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .btn-choice.is-correct:disabled,
    .btn-choice.is-wrong:disabled {
      opacity: 1;
    }

    /* Symbolic choices (monospace) */
    .btn-choice.symbolic {
      font-family: var(--font-mono);
      font-size: 1rem;
      letter-spacing: 0.5px;
    }

    /* ============================================================
       COMBO CARDS
    ============================================================ */
    .combo-card {
      background: var(--surface-card);
      border: 2px solid var(--accent-border);
      border-radius: var(--r-lg);
      padding: 14px 18px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 110px;
      box-shadow: 0 0 20px rgba(245,166,35,0.08);
    }

    .combo-card-label {
      font-size: 0.62rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
    }

    .combo-items-row {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .combo-item-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .combo-item-emoji {
      font-size: 1.7rem;
      line-height: 1;
    }

    .combo-item-qty {
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--text-2);
    }

    .combo-sep {
      font-size: 0.85rem;
      color: var(--text-3);
      padding-bottom: 6px;
    }

    /* ============================================================
       EXPAND ZONE (LEARN PHASE)
    ============================================================ */
    .expand-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
    }

    .expand-source-row {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      flex-wrap: wrap;
      justify-content: center;
    }

    .times-badge {
      width: 60px;
      height: 60px;
      border-radius: var(--r-md);
      background: var(--accent-dim);
      border: 2px solid var(--accent-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--accent);
      flex-shrink: 0;
    }

    .expand-arrow {
      font-size: 1.2rem;
      color: var(--text-3);
    }

    .expanded-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 16px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      width: 100%;
    }

    .expanded-card {
      animation: popIn 0.35s ease both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.65) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Count prompt after expansion */
    .count-prompt {
      background: var(--surface-raised);
      border: 1px solid var(--accent-border);
      border-radius: var(--r-md);
      padding: 12px 16px;
      font-size: 0.9rem;
      color: var(--text-2);
      text-align: center;
      width: 100%;
    }

    .count-prompt strong {
      color: var(--accent);
    }

    /* ============================================================
       FEEDBACK BOXES
    ============================================================ */
    .feedback {
      padding: 14px 18px;
      border-radius: var(--r-md);
      border: 1px solid;
      font-size: 0.93rem;
      line-height: 1.55;
      animation: fadeSlideUp 0.25s ease both;
    }

    .feedback.correct {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success);
    }

    .feedback.wrong {
      background: var(--error-bg);
      border-color: var(--error-border);
      color: var(--error);
    }

    .feedback.hint {
      background: var(--hint-bg);
      border-color: var(--hint-border);
      color: var(--hint);
    }

    .feedback .explanation {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: var(--text-2);
      font-size: 0.88rem;
    }

    /* ============================================================
       INFO BOXES (OBJECTIVE / BRIDGE NOTE / INSIGHT)
    ============================================================ */
    .info-box {
      background: var(--surface-raised);
      border-radius: var(--r-md);
      padding: 13px 17px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .info-box.accent-border { border-left: 3px solid var(--accent); }
    .info-box.success-border { border-left: 3px solid var(--success); }
    .info-box.hint-border { border-left: 3px solid var(--hint); }

    .info-box-label {
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .info-box p {
      font-size: 0.88rem;
      color: var(--text-2);
      line-height: 1.55;
      margin: 0;
    }

    /* ============================================================
       SYMBOLIC EXPRESSION DISPLAY
    ============================================================ */
    .expr-display {
      text-align: center;
      padding: 20px;
      background: var(--surface-raised);
      border: 2px solid var(--accent-border);
      border-radius: var(--r-lg);
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      font-family: var(--font-mono);
      color: var(--accent);
      letter-spacing: 2px;
    }

    /* Bridge visual row */
    .bridge-row {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      flex-wrap: wrap;
      justify-content: center;
      padding: var(--space-md);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
    }

    .bridge-arrow {
      font-size: 0.85rem;
      color: var(--text-3);
      font-style: italic;
    }

    .expr-pill {
      font-family: var(--font-mono);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-1);
      background: var(--surface-card);
      border: 1px solid var(--accent-border);
      border-radius: var(--r-sm);
      padding: 7px 15px;
    }

    /* ============================================================
       TITLE SCREEN
    ============================================================ */
    .title-hero {
      text-align: center;
      padding: var(--space-xl) var(--space-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
    }

    .title-icon {
      font-size: 3.5rem;
      line-height: 1;
      filter: drop-shadow(0 0 20px rgba(245,166,35,0.3));
    }

    .title-tagline {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--text-3);
    }

    .title-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 460px;
    }

    @media (max-width: 400px) {
      .title-grid { grid-template-columns: 1fr 1fr; }
    }

    .title-stat {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 12px 8px;
      text-align: center;
    }

    .title-stat-val {
      font-size: 0.92rem;
      font-weight: 800;
      color: var(--accent);
      display: block;
    }

    .title-stat-key {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-3);
      display: block;
      margin-top: 2px;
    }

    /* ============================================================
       PHASE INTRO
    ============================================================ */
    .phase-intro {
      text-align: center;
      padding: var(--space-xl) var(--space-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
    }

    .phase-icon-large {
      font-size: 3rem;
      filter: drop-shadow(0 0 16px rgba(245,166,35,0.3));
    }

    /* ============================================================
       PHASE COMPLETE
    ============================================================ */
    .phase-complete {
      text-align: center;
      padding: var(--space-xl) var(--space-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
    }

    .phase-complete-icon { font-size: 3rem; }

    .phase-complete h3 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--success);
    }

    /* ============================================================
       STREAK DOTS
    ============================================================ */
    .streak-row {
      display: flex;
      gap: 7px;
      justify-content: center;
      align-items: center;
    }

    .streak-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--border-hover);
      transition: background 0.3s;
    }

    .streak-dot.hit    { background: var(--success); }
    .streak-dot.miss   { background: var(--error); }

    /* ============================================================
       SUMMARY SCREEN
    ============================================================ */
    .summary-screen {
      text-align: center;
      padding: var(--space-xl) var(--space-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-lg);
    }

    .summary-score {
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }

    .summary-phases {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      width: 100%;
    }

    @media (max-width: 460px) {
      .summary-phases { grid-template-columns: 1fr 1fr; }
    }

    .summary-phase-chip {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px 6px;
      text-align: center;
      font-size: 0.73rem;
      font-weight: 700;
      color: var(--text-3);
      transition: all 0.3s;
    }

    .summary-phase-chip.done {
      border-color: var(--success-border);
      color: var(--success);
      background: var(--success-bg);
    }

    .summary-phase-chip .chip-icon {
      font-size: 1.4rem;
      display: block;
      margin-bottom: 4px;
    }

    /* ============================================================
       TASK HEADER (phase label + counter)
    ============================================================ */
    .task-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .task-counter {
      font-size: 0.73rem;
      font-weight: 700;
      color: var(--text-3);
    }

    /* ============================================================
       WORKED EXAMPLE
    ============================================================ */
    .worked-example {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 13px 17px;
    }

    .worked-example .we-label {
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-3);
      margin-bottom: 6px;
    }

    .worked-example p {
      font-size: 0.88rem;
      color: var(--text-2);
      line-height: 1.55;
    }

    /* ============================================================
       TEACHER NOTES PANEL
    ============================================================ */
    #teacher-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    #teacher-toggle {
      width: 100%;
      background: transparent;
      border: none;
      padding: 15px 22px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      color: var(--text-3);
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: left;
      transition: color var(--t);
    }

    #teacher-toggle:hover { color: var(--accent); }
    #teacher-toggle:focus-visible { outline: 3px solid var(--accent); outline-offset: -3px; }

    #teacher-toggle .t-arrow {
      margin-left: auto;
      font-size: 0.75rem;
      transition: transform 0.25s;
    }

    #teacher-toggle[aria-expanded="true"] .t-arrow { transform: rotate(180deg); }

    #teacher-body {
      display: none;
      padding: 0 22px 22px;
      border-top: 1px solid var(--border);
    }

    #teacher-body.open { display: block; }

    #teacher-body h4 {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--accent);
      margin: 18px 0 7px;
    }

    #teacher-body p, #teacher-body li {
      font-size: 0.86rem;
      color: var(--text-2);
      line-height: 1.6;
      margin-bottom: 5px;
    }

    #teacher-body ul { padding-left: 20px; }

    .standards-callout {
      background: var(--surface-raised);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      padding: 11px 15px;
      margin-top: 8px;

/** Create an element with attributes and children.
    @param {string} tag
    @param {object} attrs  — { class, id, type, 'aria-*', 'data-*', html, style }
    @param {...(Node|string)} children
*/
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class')       e.className = v;
    else if (k === 'html')   e.innerHTML = v;
    else if (k === 'style')  e.style.cssText = v;
    else                     e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c === null || c === undefined) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

/** Append multiple children to an element */
function append(parent, ...children) {
  children.forEach(c => c && parent.appendChild(c));
  return parent;
}

    const food = FOOD[key]; if (!food) continue;
    if (!first) row.appendChild(el('span', { class: 'combo-sep', 'aria-hidden': 'true' }, '+'));
    for (let i = 0; i < qty; i++) {
      if (i > 0) row.appendChild(el('span', { class: 'combo-sep', 'aria-hidden': 'true' }, '+'));
      const block = el('div', { class: 'combo-item-block' });
      block.appendChild(el('span', { class: 'combo-item-emoji', 'aria-hidden': 'true' }, food.emoji));
      block.appendChild(el('span', { class: 'combo-item-qty', 'aria-hidden': 'true' }, food.name));
      row.appendChild(block);
    }
    first = false;
  }

  append(card, lbl, row);
  return card;
}

/** Readable description of a combo for accessibility */
function comboDescription(combo) {
  return Object.entries(combo)
    .map(([k, v]) => `${v} ${FOOD[k]?.name || k}`)
    .join(', ');
}

/** ── Multiplied combo grid (N copies) ────────────────────── */
function buildExpandedCombos(combo, multiplier) {
  const grid = el('div', { class: 'expanded-grid',
    'aria-label': `${multiplier} combo cards expanded` });
  for (let i = 0; i < multiplier; i++) {
    const wrap = el('div', { class: 'expanded-card' });
    wrap.style.animationDelay = `${i * 75}ms`;
    wrap.appendChild(buildComboCard(combo, i));
    grid.appendChild(wrap);
  }
  return grid;
}

/** ── Progress bar ────────────────────────────────────────── */
function buildProgressBar() {
  const wrap  = el('div', { class: 'progress-wrap', 'aria-label': 'Game progress' });
  const track = el('div', { class: 'progress-track', role: 'list' });
  const meta  = el('div', { class: 'progress-meta', 'aria-hidden': 'true' });

  PHASES.forEach((phase, idx) => {
    const isDone   = State.phasesCompleted.includes(phase.id);
    const isActive = idx === State.phaseIndex;
    const seg = el('div', {
      class: `progress-seg${isDone ? ' complete' : isActive ? ' active' : ''}`,
      role: 'listitem',
      'aria-label': `${phase.label} ${isDone ? 'completed' : isActive ? 'in progress' : 'upcoming'}`
    });
    track.appendChild(seg);

    const lbl = el('span', {
      class: `progress-label${isDone ? ' complete' : isActive ? ' active' : ''}`
    }, phase.label);
    meta.appendChild(lbl);
  });

  append(wrap, track, meta);
  return wrap;
}

/** ── Task header row (eyebrow + counter) ────────────────── */
function buildTaskHeader(phaseLabel, index, total) {
  const row = el('div', { class: 'task-header' });
  row.appendChild(el('span', { class: 'phase-eyebrow' }, phaseLabel));
  row.appendChild(el('span', { class: 'task-counter', 'aria-label': `Task ${index + 1} of ${total}` },
    `Task ${index + 1} / ${total}`));
  return row;
}

/** ── Choice button grid ─────────────────────────────────── */
function buildChoices(choices, onSelect, symbolic = false) {
  const grid = el('div', { class: 'choices-grid', role: 'group', 'aria-label': 'Answer choices' });
  choices.forEach((choice, idx) => {
    const btn = el('button', {
      class: `btn btn-choice${symbolic ? ' symbolic' : ''}`,
      type: 'button',
      'data-idx': String(idx),
      'data-val': String(choice),
      'aria-label': `Choice ${idx + 1}: ${choice}`
    }, String(choice));
    btn.addEventListener('click', () => onSelect(choice, idx, btn));
    grid.appendChild(btn);
  });
  return grid;
}

/** ── Feedback box ───────────────────────────────────────── */
function buildFeedback(type, message, explanation) {
  const box = el('div', {
    class: `feedback ${type}`,
    role: type === 'hint' ? 'note' : 'alert',
    'aria-live': 'polite'
  }, message);
  if (explanation) {
    box.appendChild(el('div', { class: 'explanation' }, explanation));
  }
  return box;
}

/** ── Info box (objective / insight / bridge note) ───────── */
function buildInfoBox(label, body, borderClass = 'accent-border') {
  const box = el('div', { class: `info-box ${borderClass}` });
  box.appendChild(el('div', { class: 'info-box-label' }, label));
  box.appendChild(el('p', {}, body));
  return box;
}

/** ── Streak dots ────────────────────────────────────────── */
function buildStreakDots() {
  const row  = el('div', { class: 'streak-row', 'aria-label': 'Recent task results' });
  const last = State.streakHits.slice(-7);
  for (let i = 0; i < 7; i++) {
    const cls = i < last.length
      ? `streak-dot ${last[i] ? 'hit' : 'miss'}`
      : 'streak-dot';
    row.appendChild(el('div', { class: cls }));
  }
  return row;
}

/** ── Times badge ────────────────────────────────────────── */
function buildTimesBadge(n) {
  return el('div', {
    class: 'times-badge',
    'aria-label': `Ordered ${n ?? '?'} times`
  }, n != null ? `×${n}` : '×?');
}


/* ================================================================
   SECTION 5 — SCREEN RENDERERS (top-level dispatch)
================================================================ */

function render(noScroll = false) {
  const app = document.getElementById('app');
  app.innerHTML = '';

  switch (State.screen) {

/* ── Task Dispatch ─────────────────────────────────────── */
function renderTask(app) {

    learn:     renderLearnTask,
    practice:  renderPracticeTask,
    challenge: renderChallengeTask,
    bridge:    renderBridgeTask,
    regents:   renderRegentsTask,
  };

  (renderers[phaseId] || (() => {}))(app, task, tasks.length);

/* ================================================================
   SECTION 8 — ANSWER HANDLERS
================================================================ */

/**
 * Handle food-based tasks (value match: string or number comparison).
 * Wrong on first try → auto-show hint, re-render.
 * Wrong on second try → mark answered, show explanation.
 */
function handleAnswer(value, task) {
  if (State.answered) return;

  const isCorrect = String(value) === String(task.correctAnswer);

  if (isCorrect) {
    State.correctOnFirst = (State.attempts === 0);
    State.answered = true;
    State.streakHits.push(State.correctOnFirst);
    render(true);

  } else {
    State.attempts++;
    State.streakHits.push(false);

    if (!State.hintShown) {
      /* First wrong: reveal hint, let them retry */
      State.hintShown = true;
      render(true);
    } else {
      /* Second wrong: mark answered, show explanation */
      State.correctOnFirst = false;
      State.answered = true;
      render(true);
    }
  }
}

/**
 * Handle index-based tasks (bridge / regents).
 * Same retry logic as above.
 */
function handleIndexAnswer(selectedIndex, task) {
  if (State.answered) return;

  const isCorrect = selectedIndex === task.correct;

  if (isCorrect) {
    State.correctOnFirst = (State.attempts === 0);
    State.answered = true;
    State.streakHits.push(State.correctOnFirst);
    render(true);

  } else {
    State.attempts++;
    State.streakHits.push(false);

    if (!State.hintShown) {
      State.hintShown = true;
      render(true);
    } else {
      State.correctOnFirst = false;
      State.answered = true;
      render(true);
    }
  }
}

function onShowHint() {
  State.hintShown = true;
  render(true);
}

function onBuildExpand() {
  State.expandBuilt = true;
  render(true); // don't scroll — user should see the expansion
}


/* ================================================================
   SECTION 9 — PROGRESSION LOGIC
================================================================ */

function startGame() {
  State.screen     = 'phase-intro';
  State.phaseIndex = 0;
  State.taskIndex  = 0;
  State.resetTask();
  render();
}

function beginPhase() {
  State.screen    = 'task';
  State.taskIndex = 0;
  State.resetTask();
  render();
}

function advanceTask() {
  /* Track session stats */
  if (State.correctOnFirst) State.sessionCorrect++;
  State.sessionTotal++;

  const tasks    = currentTasks();
  const nextIdx  = State.taskIndex + 1;

  if (nextIdx >= tasks.length) {
    /* Phase finished */
    State.phasesCompleted.push(PHASES[State.phaseIndex].id);
    State.screen = 'phase-complete';
  } else {
    State.taskIndex = nextIdx;
    State.resetTask();
    State.screen = 'task';
  }

  render();
}

function goToNextPhase() {
  State.phaseIndex++;
  State.screen = 'phase-intro';
  State.resetTask();
  render();
}

function goToSummary() {
  State.screen = 'summary';
  render();
}

   SECTION 10 — SUMMARY SCREEN
================================================================ */

function renderSummary(app) {
  const card = el('div', { class: 'card' });
  const body = el('div', { class: 'summary-screen' });

  const pct = State.sessionTotal > 0
    ? Math.round((State.sessionCorrect / State.sessionTotal) * 100)
    : 0;

  append(body,
    el('div', { 'aria-hidden': 'true', style: 'font-size:3rem;' }, '🎓'),
    el('h2', { class: 'game-title' }, 'You Did It!'),
    el('p', { class: 'body-text', style: 'max-width:480px;' },
      'You used a real-world grouping model to arrive at formal algebra.'),
  );

  /* Score */
  const scoreBox = el('div', { class: 'card-inner', style: 'text-align:center;width:100%;' });
  scoreBox.appendChild(el('div', { class: 'summary-score', 'aria-label': `${pct} percent` }, `${pct}%`));
  scoreBox.appendChild(el('p', { class: 'body-text mt-sm' },
    `${State.sessionCorrect} correct on first try out of ${State.sessionTotal} total tasks`));
  body.appendChild(scoreBox);

  /* Phase chips */
  const grid = el('div', { class: 'summary-phases', 'aria-label': 'Phases completed' });
  PHASES.forEach(ph => {
    const done = State.phasesCompleted.includes(ph.id);
    const chip = el('div', { class: `summary-phase-chip${done ? ' done' : ''}` });
    chip.appendChild(el('span', { class: 'chip-icon', 'aria-hidden': 'true' }, ph.icon));
    chip.appendChild(document.createTextNode(ph.label));
    grid.appendChild(chip);
  });
  body.appendChild(grid);

  /* Closing insight */
  const insight = el('div', { class: 'card-inner', style: 'text-align:left;width:100%;' });
  insight.appendChild(el('div', { class: 'phase-eyebrow' }, '🔗 What You Built'));
  const p = document.createElement('p');
  p.className = 'body-text mt-sm';
  p.innerHTML = 'You started by ordering food combos and discovered that <strong style="color:var(--accent)">the outside number always applies to every item inside the group.</strong> In algebra, that\'s exactly what the distributive property says — and you just applied it to Regents-level expressions.';
  insight.appendChild(p);
  body.appendChild(insight);

  /* Streak dots */
  if (State.streakHits.length > 0) {
    append(body,
      el('p', { class: 'caption' }, 'Your answer history:'),
      buildStreakDots(),
    );
  }

  const restartBtn = el('button', {
    class: 'btn btn-ghost',
    type: 'button',
    'aria-label': 'Play again from the beginning'
  }, '↺  Play Again');
  restartBtn.addEventListener('click', () => { State.reset(); render(); });
  body.appendChild(restartBtn);

  card.appendChild(body);
  app.appendChild(card);
}


/* ================================================================
   SECTION 11 — TEACHER NOTES PANEL
================================================================ */

function buildTeacherPanel() {
  const panel = el('div', { id: 'teacher-panel', 'aria-label': 'Teacher and educator notes' });

  const toggle = el('button', {
    id: 'teacher-toggle',
    type: 'button',
    'aria-expanded': 'false',
    'aria-controls': 'teacher-body'
  });
  toggle.innerHTML = `
    <span aria-hidden="true">📋</span>
    Teacher &amp; Educator Notes
    <span class="t-arrow" aria-hidden="true">▾</span>
  `;
  toggle.addEventListener('click', () => {
    const body   = document.getElementById('teacher-body');
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    toggle.setAttribute('aria-expanded', String(!isOpen));
  });
  panel.appendChild(toggle);

  const body = el('div', { id: 'teacher-body' });
  body.innerHTML = `
    <h4>What This Game Teaches</h4>
    <p>Combo Builder develops the conceptual foundation of the distributive property by grounding it in a familiar real-world context before introducing symbolic notation. Students learn that an outside multiplier applies to every item inside a grouped quantity — building toward formal equivalent-expression work in Algebra I.</p>

    <h4>Learning Progression (5 Phases)</h4>
    <ul>
      <li><strong>Phase 1 – Learn:</strong> Students physically "build" repeated combo orders using a visual expand interaction. They count totals from the laid-out cards. Zero symbolic notation at this stage.</li>
      <li><strong>Phase 2 – Practice:</strong> Multiple-choice tasks with visual support. Varied combos and multipliers build fluency with the grouping pattern.</li>
      <li><strong>Phase 3 – Challenge:</strong> Three-item combos, larger multipliers, and a reverse task (finding the multiplier from a given result). Reduced scaffolding.</li>
      <li><strong>Phase 4 – Bridge to Math:</strong> Gradual symbol introduction — notation → labeled variables (b, f) → algebraic variables (x, y). Students match food models to formal expressions.</li>
      <li><strong>Phase 5 – Regents Transfer:</strong> Standard Algebra I distributive property problems in Regents-style multiple-choice format.</li>
    </ul>

    <h4>Standards Alignment</h4>
    <div class="standards-callout">
      This game supports early conceptual understanding of generating equivalent expressions by applying a factor to each term in a grouped quantity — a foundational skill for distributive property work in Algebra I and Regents-style symbolic manipulation. Content is aligned to Algebra I equivalent expression and structure work, including interpreting the structure of expressions and producing equivalent forms. This aligns conceptually with the Seeing Structure in Expressions and Arithmetic with Polynomials and Rational Expressions domains found in Algebra I standards frameworks. No specific code numbers are claimed, as exact alignment may vary by district framework.
    </div>

    <h4>Instructional Design Framework</h4>
    <ul>
      <li>Follows a Concrete → Representational → Abstract (CRA) progression throughout all 5 phases</li>
      <li>Wrong answers trigger a hint first, then explanation on second incorrect attempt — never a penalty without support</li>
      <li>No timer, no score pressure; designed for calm mastery-oriented learning</li>
      <li>Visual expand mechanic in Phase 1 can be projected and discussed as a whole-class activity before independent work</li>
    </ul>

    <h4>Suggested Classroom Use</h4>
    <p>Assign Phases 1–3 as a warm-up or independent station before introducing formal distributive property. Use Phases 4–5 as a bridge activity between visual/manipulative work and worksheet-level symbolic practice. The Phase 4 bridge tasks are particularly useful as a discussion anchor: "What does the parentheses mean? What does the number outside do?"</p>

    <h4>Accessibility Notes</h4>
    <p>High-contrast dark theme; large click targets (min 50px); keyboard-navigable; ARIA labels on all interactive elements; no color-only meaning; no audio dependencies; tested for Chromebook performance.</p>
  `;

  panel.appendChild(body);
  return panel;
}


/* ================================================================
   SECTION 12 — ACCESSIBILITY HELPERS
================================================================ */

/** Move focus to first sensible interactive element after render */
function focusFirstInteractive(app) {
  requestAnimationFrame(() => {
    const target = app.querySelector([
      '#start-btn',
      '#phase-continue-btn',
      '#build-btn',
      '.question-text',
      '.btn-choice',
      '#next-phase-btn',
      '#next-btn',
      'h1', 'h2',
    ].join(', '));
    if (target) {
      if (target.tagName !== 'BUTTON') {
        target.setAttribute('tabindex', '-1');
      }
      target.focus({ preventScroll: true });
    }
  });
}


/* ================================================================
   SECTION 13 — INIT
================================================================ */

document.addEventListener('DOMContentLoaded', () => {
  render();
});

</script>
